version: '3.8'

services:
  kimi2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: clockclock1/kimi2api:latest
    container_name: kimi2api
    ports:
      - "8000:8000"
    environment:
      - KIMI_TOKEN=${KIMI_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-kimi2api}
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
